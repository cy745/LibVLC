name: Build LibVLC for Windows

on:
  workflow_dispatch:
    inputs:
      vlc_commit:
        description: 'VLC commit SHA (3.0.x branch)'
        required: false
        default: '2d8e0f8cf5935dca3917ce015299eb91480d8167'
      contrib_sha:
        description: 'Contribs SHA (must match VLC commit)'
        required: false
        default: '4ca2c80e9a79293ceac7d640ab7963c3b000c370'
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.github/workflows/**'

env:
  VLC_COMMIT: ${{ github.event.inputs.vlc_commit || '2d8e0f8cf5935dca3917ce015299eb91480d8167' }}
  CONTRIB_SHA: ${{ github.event.inputs.contrib_sha || '4ca2c80e9a79293ceac7d640ab7963c3b000c370' }}
  CONTRIB_URL: https://artifacts.videolan.org/vlc-3.0/win64/vlc-contrib-x86_64-w64-mingw32-${{ github.event.inputs.contrib_sha || '4ca2c80e9a79293ceac7d640ab7963c3b000c370' }}.tar.bz2
  DOCKER_IMAGE: vlc-win64-3.0-local
  VLC_REPO: https://code.videolan.org/videolan/vlc.git

jobs:
  build:
    strategy:
      matrix:
        os: [windows, macos]
        include:
          - os: windows
            runs-on: ubuntu-latest
          - os: macos
            runs-on: macos-latest

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: matrix.os == 'windows'
        uses: docker/setup-buildx-action@v3

      - name: Check VLC commit
        if: matrix.os == 'windows'
        run: |
          echo "VLC Commit: ${{ env.VLC_COMMIT }}"
          echo "Contrib SHA: ${{ env.CONTRIB_SHA }}"
          echo "Contrib URL: ${{ env.CONTRIB_URL }}"

      - name: Check if contribs exist
        if: matrix.os == 'windows'
        id: check_contribs
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.CONTRIB_URL }}")
          echo "Contribs HTTP response: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Contribs not found at ${{ env.CONTRIB_URL }}"
            exit 1
          fi

      - name: Pull VLC Docker image
        if: matrix.os == 'windows'
        run: |
          # Use VideoLAN's pre-built image instead of building from source
          # Available tags: 20251220085103, 20251208092116, 20211008140026
          docker pull registry.videolan.org/vlc-debian-win64-3.0:20251220085103
          docker tag registry.videolan.org/vlc-debian-win64-3.0:20251220085103 ${{ env.DOCKER_IMAGE }}

      - name: Clone VLC source
        if: matrix.os == 'windows'
        run: |
          git clone ${{ env.VLC_REPO }} vlc-build
          cd vlc-build
          git fetch origin ${{ env.VLC_COMMIT }}
          git checkout ${{ env.VLC_COMMIT }}

      - name: Create output directory
        if: matrix.os == 'windows'
        run: mkdir -p output

      - name: Build VLC
        if: matrix.os == 'windows'
        run: |
          docker run --rm \
            -u root \
            -v $(pwd)/vlc-build:/vlc \
            -v $(pwd)/output:/output \
            -e VLC_PREBUILT_CONTRIBS_URL="${{ env.CONTRIB_URL }}" \
            ${{ env.DOCKER_IMAGE }} \
            sh -c "git config --global --add safe.directory /vlc && \
                   cd /vlc && \
                   ./extras/package/win32/build.sh -z -r -p; exit 0"

      - name: Copy build artifacts
        if: matrix.os == 'windows'
        run: |
          docker run --rm \
            -u root \
            -v $(pwd)/vlc-build:/vlc \
            -v $(pwd)/output:/output \
            ${{ env.DOCKER_IMAGE }} \
            sh -c "mkdir -p /output && \
                   cp /vlc/win64/lib/.libs/libvlc.dll /output/ && echo 'libvlc.dll copied' || echo 'libvlc.dll not found'; \
                   cp /vlc/win64/src/.libs/libvlccore.dll /output/ && echo 'libvlccore.dll copied' || echo 'libvlccore.dll not found'; \
                   mkdir -p /output/modules && \
                   find /vlc/win64/modules -name '*.dll' -exec cp {} /output/modules/ \; && echo 'modules copied' || echo 'modules not found'"

      - name: Verify artifacts
        if: matrix.os == 'windows'
        run: |
          echo "=== Build Artifacts ==="
          ls -lh output/*.dll 2>/dev/null || echo "No DLLs found"
          if [ -d output/modules ]; then
            echo "Plugin count: $(ls output/modules/*.dll 2>/dev/null | wc -l)"
          fi

      - name: Upload Windows artifacts
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: libvlc-windows-${{ env.VLC_COMMIT }}
          path: |
            output/*.dll
            output/modules/
          retention-days: 30

      # macOS build steps
      - name: Build VLC for macOS
        if: matrix.os == 'macos'
        run: |
          chmod +x ./build-libvlc-macos.sh
          ./build-libvlc-macos.sh

      - name: Upload macOS artifacts
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: libvlc-macos-${{ env.VLC_COMMIT }}
          path: |
            output-macos/*.dylib
            output-macos/modules/
          retention-days: 30

      - name: Upload VLC source info
        if: always()
        run: |
          echo "${{ env.VLC_COMMIT }}" > vlc_commit.txt
          echo "${{ env.CONTRIB_SHA }}" > contrib_sha.txt
          echo "${{ env.CONTRIB_URL }}" > contrib_url.txt

      - name: Upload commit info as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-info-${{ matrix.os }}
          path: |
            vlc_commit.txt
            contrib_sha.txt
            contrib_url.txt
          retention-days: 30
